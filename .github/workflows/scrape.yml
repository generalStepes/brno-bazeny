name: Scrape pool availability

on:
  schedule:
    # Every hour, at :17 rather than :00 - GitHub Actions heavily queues/
    # delays runs scheduled for the top of the hour since that's the most
    # congested cron time across all of GitHub; off-the-hour minutes get
    # scheduled much more reliably.
    - cron: '17 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-pool-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: npm run scrape

      - name: Commit updated data
        run: |
          git config user.name "pool-availability-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/latest.json docs/data/occupancy-history.json docs/images/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update pool availability data"
          # Now that runs can be triggered every ~30min from an external cron
          # (GitHub's own schedule trigger is unreliable) as well as manual
          # dispatches, overlapping runs can race to push. Retry with rebase,
          # preferring our just-scraped data over whatever else touched the
          # same files, since it's the freshest snapshot either way.
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt), rebasing onto latest and retrying..."
            git fetch origin main
            git rebase -X ours origin/main
            sleep $((RANDOM % 10 + 1))
          done
          echo "::error::Failed to push after retries"
          exit 1
